<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Ağustos'a Kalan</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Dancing+Script:wght@400;600&family=Italiana&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --text: #ffffff;
            --overlay: rgba(0, 0, 0, 0.35);
            --divider: rgba(255, 255, 255, 0.4);
        }

        html, body { height: 100%; }

        body {
            min-height: 100vh;
            color: var(--text);
            font-family: 'Cormorant Garamond', Georgia, serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Tam ekran arka plan fotoğrafı */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('background.jpg') center center / cover no-repeat;
            z-index: -2;
        }

        /* Hafif karartma */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: -1;
        }

        /* Üst bar */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            z-index: 10;
        }

        .logo {
            font-size: 1.8em;
            color: #fff;
            line-height: 1;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: opacity 0.3s;
        }
        .menu-btn:hover { opacity: 0.7; }
        .menu-btn span {
            display: block;
            width: 28px;
            height: 1.5px;
            background: #fff;
        }

        /* Ana içerik */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px 60px;
            position: relative;
            z-index: 2;
        }

        /* Başlık */
        .title {
            font-family: 'Italiana', serif;
            font-size: 2.8em;
            font-weight: 400;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        /* Süsleme (ornament) */
        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 10px 0 50px;
            color: #fff;
            opacity: 0.9;
        }
        .ornament::before,
        .ornament::after {
            content: '';
            height: 1px;
            width: 70px;
            background: var(--divider);
        }
        .ornament-icon {
            font-size: 0.7em;
            letter-spacing: 4px;
        }

        /* Geri sayım - DİKEY */
        .countdown {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .time-box {
            padding: 18px 0;
            min-width: 140px;
            position: relative;
        }

        /* Her kutu arasında ince çizgi */
        .time-box:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: var(--divider);
        }

        .time-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4em;
            font-weight: 300;
            display: block;
            line-height: 1;
            letter-spacing: 2px;
        }

        .time-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 8px;
            font-weight: 400;
            opacity: 0.95;
        }

        /* Alt yazı (el yazısı) */
        .signature {
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .signature-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8em;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .signature .ornament {
            margin: 5px 0 0;
        }
        .signature .ornament::before,
        .signature .ornament::after {
            width: 40px;
        }

        /* Scroll down arrow */
        .scroll-down {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 1.5em;
            opacity: 0.8;
            animation: bounce 2s infinite;
            cursor: pointer;
            background: none;
            border: none;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        /* Expired */
        .expired {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5em;
            margin-top: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Havai fişek canvas */
        #fireworks {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            display: none;
        }

        /* Gizli ses butonu - sessiz moda alındı ama ihtiyaç olursa erişilebilir */
        .sound-toggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            transition: background 0.3s;
        }
        .sound-toggle:hover { background: rgba(255,255,255,0.2); }

        /* Responsive */
        @media (max-width: 600px) {
            .top-bar { padding: 20px 25px; }
            .title { font-size: 1.5em; letter-spacing: 4px; }
            .time-value { font-size: 3em; }
            .time-label { font-size: 0.75em; letter-spacing: 3px; }
            .signature-text { font-size: 1.5em; }
            .ornament::before, .ornament::after { width: 45px; }
        }
    </style>
</head>
<body>

<!-- Üst bar: logo + menü -->
<header class="top-bar">
    <div class="logo" title="Bilal & Gelin">
        <!-- Çift kalp ikonu (SVG) -->
        <svg width="42" height="32" viewBox="0 0 42 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 28 C4 22, 2 14, 6 8 C9 4, 14 4, 12 12 C10 4, 15 4, 18 8 C22 14, 20 22, 12 28 Z"
                  stroke="white" stroke-width="1.3" fill="none"/>
            <path d="M28 28 C20 22, 18 14, 22 8 C25 4, 30 4, 28 12 C26 4, 31 4, 34 8 C38 14, 36 22, 28 28 Z"
                  stroke="white" stroke-width="1.3" fill="none"/>
        </svg>
    </div>
    <button class="menu-btn" id="menuBtn" aria-label="Menü">
        <span></span>
        <span></span>
        <span></span>
    </button>
</header>

<canvas id="fireworks"></canvas>

<!-- Ana içerik -->
<main class="container">
    <h1 class="title">10 Ağustos'a Kalan</h1>
    <div class="ornament">
        <span class="ornament-icon">♡</span>
    </div>

    <div class="countdown" id="countdown">
        <div class="time-box">
            <span class="time-value" id="days">0</span>
            <div class="time-label">Gün</div>
        </div>
        <div class="time-box">
            <span class="time-value" id="hours">0</span>
            <div class="time-label">Saat</div>
        </div>
        <div class="time-box">
            <span class="time-value" id="minutes">0</span>
            <div class="time-label">Dakika</div>
        </div>
        <div class="time-box">
            <span class="time-value" id="seconds">0</span>
            <div class="time-label">Saniye</div>
        </div>
    </div>

    <div id="message"></div>

    <div class="signature">
        <p class="signature-text">Sonsuza kadar birlikte ♥</p>
        <div class="ornament">
            <span class="ornament-icon">♡</span>
        </div>
    </div>

    <button class="scroll-down" aria-label="Aşağı kaydır">⌄</button>
</main>

<button class="sound-toggle" id="soundToggle" title="Ses aç/kapat">🔇</button>

<script>
    const targetDate = new Date('2026-08-10T19:00:00+03:00').getTime();

    // Ses kontrolü
    const soundToggle = document.getElementById('soundToggle');
    let soundEnabled = false;
    let audioCtx = null;
    let lastSecond = -1;

    soundToggle.addEventListener('click', () => {
        soundEnabled = !soundEnabled;
        soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
        if (soundEnabled && !audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    });

    function playTick() {
        if (!soundEnabled || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 800; osc.type = 'sine';
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playCelebration() {
        if (!soundEnabled || !audioCtx) return;
        [523, 659, 784, 1047].forEach((freq, i) => {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = freq; osc.type = 'sine';
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.5);
            }, i * 200);
        });
    }

    // Geri sayım
    function updateCountdown() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance < 0) {
            document.getElementById('countdown').style.display = 'none';
            document.getElementById('message').innerHTML =
                '<p class="expired">✦ Mutluluklar ✦</p>';
            clearInterval(timer);
            startFireworks();
            playCelebration();
            return;
        }

        const days = Math.floor(distance / (1000*60*60*24));
        const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
        const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
        const seconds = Math.floor((distance % (1000*60)) / 1000);

        document.getElementById('days').textContent = days;
        document.getElementById('hours').textContent = String(hours).padStart(2, '0');
        document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
        document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

        if (seconds !== lastSecond) { lastSecond = seconds; playTick(); }
    }

    updateCountdown();
    const timer = setInterval(updateCountdown, 1000);

    // Havai fişekler
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let fireworksRunning = false;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function startFireworks() {
        canvas.style.display = 'block';
        fireworksRunning = true;
        animateFireworks();
        setInterval(createFirework, 800);
    }

    function createFirework() {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height * 0.5;
        const colors = ['#ffffff', '#f5f5f5', '#e8e8e8', '#d4af7a'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        for (let i = 0; i < 60; i++) {
            const angle = (Math.PI * 2 * i) / 60;
            const speed = Math.random() * 5 + 2;
            particles.push({
                x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
                alpha: 1, color, size: Math.random()*3+1
            });
        }
    }

    function animateFireworks() {
        if (!fireworksRunning) return;
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, idx) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.alpha -= 0.01;
            if (p.alpha <= 0) { particles.splice(idx, 1); return; }
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(animateFireworks);
    }

    // Scroll down
    document.querySelector('.scroll-down').addEventListener('click', () => {
        window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
    });
</script>
</body>
</html>
